 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTE - Conexión Blindada HDC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body id="main-body" class="bg-[#001f3f] min-h-screen font-sans text-white">

    <div id="app" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-2xl text-slate-800">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-black text-navy">Guacara Te Escucha</h1>
                <p class="text-[10px] text-orange-600 font-bold uppercase tracking-widest">Verificación de Especialista</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <input type="text" id="fvp" placeholder="FVP (Ej: 12345)" required class="w-full p-3 border-2 border-slate-100 rounded-xl outline-none focus:border-orange-500 font-bold text-navy">
                <input type="password" id="pass" placeholder="Contraseña" required class="w-full p-3 border-2 border-slate-100 rounded-xl outline-none focus:border-orange-500 font-bold text-navy">
                <button type="submit" id="btn" class="w-full bg-[#ff851b] text-white font-black py-4 rounded-xl hover:brightness-110 shadow-lg transition-all uppercase">ENTRAR</button>
            </form>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN CORREGIDA ---
        // Nota: Se eliminó el "/rest/v1/" de la URL
        const SB_URL = 'https://oqarmkugdzedptbqcygq.supabase.co'; 
        const SB_KEY = 'sb_publishable_rQkY-aQgOyW_eh-fyO_JkA_tLXKdqK0';
        
        const gte = supabase.createClient(SB_URL, SB_KEY);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fvpVal = document.getElementById('fvp').value.trim();
            const passVal = document.getElementById('pass').value.trim();
            const btn = document.getElementById('btn');

            btn.innerHTML = "CONECTANDO CON SUPABASE...";
            btn.disabled = true;

            try {
                // Hacemos la consulta limpia
                const { data, error } = await gte
                    .from('psicologos')
                    .select('*')
                    .eq('codigo_fvp', fvpVal)
                    .maybeSingle(); // Usamos maybeSingle para evitar errores si no hay datos

                if (error) {
                    console.error("Error técnico:", error);
                    alert("Error de conexión: " + error.message);
                } else if (!data) {
                    alert("El FVP '" + fvpVal + "' no existe en la base de datos.");
                } else if (data.password !== passVal) {
                    alert("Contraseña incorrecta.");
                } else {
                    alert("¡Acceso Exitoso! Bienvenido/a Dr/Dra. " + data.nombres);
                    renderDashboard(data);
                }
            } catch (err) {
                alert("Fallo crítico de red.");
            } finally {
                btn.innerHTML = "ENTRAR";
                btn.disabled = false;
            }
        });

        function renderDashboard(user) {
            const body = document.getElementById('main-body');
            body.className = "bg-slate-100 min-h-screen p-8 text-slate-800";
            body.innerHTML = `
                <div class="max-w-4xl mx-auto bg-white p-10 rounded-3xl shadow-xl border-t-8 border-orange-500">
                    <h1 class="text-3xl font-black text-[#001f3f] uppercase tracking-tighter">Portal GTE</h1>
                    <p class="text-xl text-slate-500">Especialista: <span class="font-bold text-navy">${user.nombres} ${user.apellidos}</span></p>
                    <hr class="my-6">
                    <div class="p-10 border-2 border-dashed border-slate-200 rounded-2xl text-center text-slate-400 font-bold">
                        DASHBOARD CONECTADO EXITOSAMENTE
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
