     <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTE - Sistema Clínico HDC 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { navy: '#001f3f', orange: '#ff851b' } } } }
    </script>
</head>
<body class="bg-[#001f3f] min-h-screen flex items-center justify-center font-sans text-white">

    <div id="app" class="w-full max-w-md p-8 bg-white rounded-xl shadow-2xl text-slate-800">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-navy">Guacara Te Escucha</h1>
            <p class="text-sm text-slate-500">Acceso Controlado HDC 2026</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-navy uppercase mb-1">Código FVP</label>
                <input type="text" id="fvpInput" placeholder="Ej: 12345" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-orange">
            </div>
            <div>
                <label class="block text-xs font-bold text-navy uppercase mb-1">Contraseña</label>
                <input type="password" id="passwordInput" placeholder="••••••••" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-orange">
            </div>
            <button type="submit" id="btn" class="w-full bg-orange text-white font-bold py-3 rounded-lg hover:bg-orange/90 transition-all">
                Ingresar al Sistema
            </button>
        </form>
    </div>

    <script>
        // CONFIGURACIÓN (He limpiado la URL para que no de error)
        const URL = 'https://oqarmkugdzedptbqcygq.supabase.co'; 
        const KEY = 'sb_publishable_rQkY-aQgOyW_eh-fyO_JkA_tLXKdqK0';
        
        // Usamos GTE_DB para evitar errores de nombre
        const GTE_DB = supabase.createClient(URL, KEY);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fvp = document.getElementById('fvpInput').value;
            const pass = document.getElementById('passwordInput').value;
            const btn = document.getElementById('btn');

            btn.innerHTML = "Verificando...";
            btn.disabled = true;

            try {
                // Buscamos al psicólogo y traemos su contraseña de la base de datos
                const { data, error } = await GTE_DB
                    .from('psicologos')
                    .select('nombres, password, activo')
                    .eq('codigo_fvp', fvp)
                    .single();

                if (error || !data) {
                    alert("El código FVP no existe en Guacara.");
                } else if (data.password !== pass) {
                    alert("Contraseña incorrecta para este especialista.");
                } else if (!data.activo) {
                    alert("Usuario inactivo.");
                } else {
                    alert("¡Bienvenido/a Dr/Dra. " + data.nombres + "!");
                    // Aquí es donde luego cargaremos el panel
                }
            } catch (err) {
                alert("Error de conexión");
            } finally {
                btn.innerHTML = "Ingresar al Sistema";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
