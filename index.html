<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTE - Diagnóstico HDC 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body id="main-body" class="bg-[#001f3f] min-h-screen font-sans text-white">

    <div id="app" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-2xl text-slate-800 text-center">
            <h1 class="text-2xl font-black text-[#001f3f] mb-2">Guacara Te Escucha</h1>
            <p class="text-xs text-orange-600 font-bold mb-8 uppercase">MODO DIAGNÓSTICO ACTIVO</p>

            <form id="loginForm" class="space-y-5 text-left">
                <input type="text" id="fvp" placeholder="FVP (Ej: 12345)" required class="w-full p-3 border-2 border-slate-100 rounded-xl outline-none focus:border-orange-500 font-bold">
                <input type="password" id="pass" placeholder="Contraseña" required class="w-full p-3 border-2 border-slate-100 rounded-xl outline-none focus:border-orange-500 font-bold">
                <button type="submit" id="btn" class="w-full bg-[#ff851b] text-white font-black py-4 rounded-xl hover:brightness-110 shadow-lg transition-all">CONECTAR</button>
            </form>
        </div>
    </div>

    <script>
        const SB_URL = 'https://oqarmkugdzedptbqcygq.supabase.co'; 
        const SB_KEY = 'sb_publishable_rQkY-aQgOyW_eh-fyO_JkA_tLXKdqK0';
        const gte = supabase.createClient(SB_URL, SB_KEY);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const fvpInput = document.getElementById('fvp').value.trim(); // Limpia espacios del usuario
            const passInput = document.getElementById('pass').value.trim();

            btn.innerHTML = "BUSCANDO EN NUBE...";
            btn.disabled = true;

            try {
                // Buscamos sin filtros estrictos para ver si la tabla responde
                const { data, error } = await gte
                    .from('psicologos')
                    .select('*')
                    .eq('codigo_fvp', fvpInput)
                    .single();

                if (error) {
                    console.error("Error de Supabase:", error);
                    alert("SISTEMA: " + error.message + " (Asegúrate que el FVP sea idéntico en la tabla)");
                } else if (!data) {
                    alert("ERROR: No se encontró ningún registro con ese FVP.");
                } else if (data.password !== passInput) {
                    alert("ERROR: La contraseña no coincide con la base de datos.");
                } else {
                    alert("¡ÉXITO! Especialista identificado: " + data.nombres);
                    renderDashboard(data);
                }
            } catch (err) {
                console.error("Fallo de red:", err);
            } finally {
                btn.innerHTML = "CONECTAR";
                btn.disabled = false;
            }
        });

        function renderDashboard(user) {
            const body = document.getElementById('main-body');
            body.className = "bg-slate-100 min-h-screen p-8 text-slate-800";
            body.innerHTML = `<div class="max-w-4xl mx-auto bg-white p-10 rounded-3xl shadow-xl border-t-8 border-orange-500">
                <h1 class="text-3xl font-black text-navy uppercase">Bienvenido/a</h1>
                <p class="text-xl text-slate-600">${user.nombres} ${user.apellidos}</p>
                <hr class="my-6">
                <button onclick="location.reload()" class="bg-navy text-white px-6 py-2 rounded-lg font-bold">SALIR</button>
            </div>`;
        }
    </script>
</body>
</html>
