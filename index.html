<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTE - Sistema Clínico HDC 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { navy: '#001f3f', orange: '#ff851b' } } } }
    </script>
</head>
<body id="body-context" class="bg-[#001f3f] min-h-screen font-sans text-white">

    <div id="main-app" class="min-h-screen flex items-center justify-center p-4">
        
        <div id="login-card" class="w-full max-w-md p-8 bg-white rounded-xl shadow-2xl text-slate-800">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-navy">Guacara Te Escucha</h1>
                <p class="text-xs text-slate-500 font-black tracking-widest uppercase">Fase 3: Atención Especializada</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-black text-navy uppercase mb-1">Código FVP</label>
                    <input type="text" id="fvpInput" placeholder="Ej: 12345" required class="w-full p-3 border-2 border-slate-100 rounded-lg outline-none focus:border-orange transition-all">
                </div>
                <div>
                    <label class="block text-xs font-black text-navy uppercase mb-1">Contraseña</label>
                    <input type="password" id="passwordInput" placeholder="••••••••" required class="w-full p-3 border-2 border-slate-100 rounded-lg outline-none focus:border-orange transition-all">
                </div>
                <button type="submit" id="btn" class="w-full bg-orange text-white font-black py-4 rounded-lg hover:shadow-lg transform active:scale-95 transition-all">
                    INGRESAR AL SISTEMA
                </button>
            </form>
            <p class="text-[9px] text-center mt-6 text-slate-400 font-bold tracking-widest uppercase italic">Propiedad de la Alcaldía de Guacara | HDC 2026</p>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const URL = 'https://oqarmkugdzedptbqcygq.supabase.co'; 
        const KEY = 'sb_publishable_rQkY-aQgOyW_eh-fyO_JkA_tLXKdqK0';
        const GTE_DB = supabase.createClient(URL, KEY);

        const mainApp = document.getElementById('main-app');

        // LÓGICA DE LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fvp = document.getElementById('fvpInput').value;
            const pass = document.getElementById('passwordInput').value;
            const btn = document.getElementById('btn');

            btn.innerHTML = "VALIDANDO...";
            btn.disabled = true;

            try {
                const { data, error } = await GTE_DB
                    .from('psicologos')
                    .select('*')
                    .eq('codigo_fvp', fvp)
                    .single();

                if (error || !data) {
                    alert("ERROR: Especialista no registrado.");
                } else if (data.password !== pass) {
                    alert("ERROR: Contraseña incorrecta.");
                } else {
                    cargarDashboard(data);
                }
            } catch (err) {
                alert("Error de conexión.");
            } finally {
                btn.innerHTML = "INGRESAR AL SISTEMA";
                btn.disabled = false;
            }
        });

        // FUNCIÓN PARA CARGAR EL PANEL DE CONTROL
        function cargarDashboard(doctor) {
            // Cambiamos el fondo del body
            document.getElementById('body-context').classList.replace('bg-[#001f3f]', 'bg-slate-100');
            
            // Reemplazamos todo el contenido por el Dashboard
            mainApp.classList.remove('items-center', 'justify-center');
            mainApp.innerHTML = `
                <div class="w-full max-w-6xl mx-auto py-8 text-slate-800">
                    <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-xl shadow-sm border-l-8 border-orange">
                        <div>
                            <h1 class="text-2xl font-black text-navy">Panel Clínico GTE</h1>
                            <p class="text-sm text-slate-500">Bienvenido/a, <b>Dr/Dra. ${doctor.nombres} ${doctor.apellidos}</b></p>
                        </div>
                        <button onclick="location.reload()" class="bg-navy text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-red-600 transition-all">
                            CERRAR SESIÓN
                        </button>
                    </div>

                    <div class="grid md:grid-cols-3 gap-6">
                        <div class="space-y-6">
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                <h3 class="font-bold text-navy mb-4 border-b pb-2 uppercase text-xs tracking-wider">Acciones Rápidas</h3>
                                <button class="w-full bg-orange text-white py-3 rounded-lg font-bold text-sm mb-3 shadow-md">+ Nueva Consulta</button>
                                <button class="w-full border-2 border-navy text-navy py-3 rounded-lg font-bold text-sm hover:bg-slate-50">Ver Historial</button>
                            </div>
                            
                            <div class="bg-navy text-white p-6 rounded-xl shadow-sm">
                                <p class="text-[10px] uppercase font-bold text-orange mb-1">Estado del Sistema</p>
                                <p class="text-xs">Sincronizado con HDC Cloud 2026</p>
                            </div>
                        </div>

                        <div class="md:col-span-2">
                            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                                    <h3 class="font-bold text-navy">Pacientes Asignados</h3>
                                    <span class="bg-navy text-white text-[10px] px-2 py-1 rounded">FVP: ${doctor.codigo_fvp}</span>
                                </div>
                                <div class="p-12 text-center">
                                    <svg class="w-16 h-16 mx-auto text-slate-200 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                                    <p class="text-slate-400 font-medium">No hay pacientes registrados en tu agenda.</p>
                                    <p class="text-xs text-slate-300 mt-1">Usa el botón "+ Nueva Consulta" para empezar.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
