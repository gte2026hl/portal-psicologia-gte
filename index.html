<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTE 2026 - Gestión Clínica Masiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        window.db = db;
        window.auth = auth;
        window.appId = appId;
        window.collectionPath = `artifacts/${appId}/public/data/expedientes`;

        const initAuth = async () => {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            await signInAnonymously(auth);
          }
        };
        initAuth();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Open+Sans:wght@400;600;700&display=swap');
        
        :root { 
            --gte-blue: #003366; 
            --gte-orange: #FF6600; 
            --gte-bg: #003366;
        }
        
        body { 
            font-family: 'Open Sans', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0; 
        }

        .bg-gte-main { background-color: var(--gte-bg); }
        .text-gte-blue { color: var(--gte-blue); }
        .text-gte-orange { color: var(--gte-orange); }
        .bg-gte-orange { background-color: var(--gte-orange); }
        .bg-gte-blue { background-color: var(--gte-blue); }

        .btn-gte-main {
            background-color: var(--gte-blue);
            color: white;
            font-weight: 800;
            padding: 16px 24px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-gte-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 51, 102, 0.2);
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 45px;
            padding: 60px 45px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
            border-top: 15px solid var(--gte-orange);
        }

        .form-label {
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .form-input-gte {
            width: 100%;
            background-color: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            padding: 14px 18px;
            font-weight: 600;
            color: var(--gte-blue);
            outline: none;
            transition: 0.2s;
        }
        .form-input-gte:focus {
            border-color: var(--gte-orange);
            background-color: white;
        }

        /* Botón de ojo para contraseña */
        .pass-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            cursor: pointer;
            transition: 0.2s;
            background: none;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pass-toggle:hover {
            color: var(--gte-orange);
        }

        .clinical-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 51, 102, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .clinical-box {
            background: white;
            width: 100%;
            max-width: 850px;
            border-radius: 35px;
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .animate-fade { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 z-[100] bg-gte-main flex items-center justify-center p-6">
        <div class="login-card animate-fade text-center">
            <h1 class="text-4xl font-black text-gte-blue mb-12 uppercase tracking-tighter">GTE 2026</h1>
            
            <div class="space-y-8 text-left">
                <div>
                    <label class="form-label">Identificación</label>
                    <input type="text" id="user_id" class="form-input-gte" placeholder="Nombre de usuario">
                </div>
                <div>
                    <label class="form-label">Contraseña</label>
                    <div class="relative">
                        <input type="password" id="user_pass" class="form-input-gte pr-14" placeholder="••••••••">
                        <button type="button" onclick="togglePasswordVisibility()" id="btn-toggle-pass" class="pass-toggle">
                            <!-- SVG Ojo Abierto -->
                            <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            <!-- SVG Ojo Cerrado (oculto por defecto) -->
                            <svg id="eye-closed" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                        </button>
                    </div>
                </div>
                
                <button onclick="iniciarSesionCloud()" class="w-full btn-gte-main shadow-xl mt-4">
                    Entrar al Sistema
                </button>
                
                <p id="login-loading" class="hidden text-[10px] text-center font-bold text-slate-400 animate-pulse uppercase tracking-widest mt-4">Conexión Segura...</p>
            </div>

            <footer class="mt-12">
                <p class="text-[9px] text-slate-300 font-bold uppercase tracking-[2px]">
                    HDC2026 - Guacara Te Escucha
                </p>
            </footer>
        </div>
    </div>

    <!-- SIDEBAR -->
    <nav id="sidebar" class="hidden w-full md:w-80 bg-gte-main text-white flex flex-col sticky top-0 md:h-screen z-50 shadow-2xl">
        <div class="p-10 text-center">
            <h2 class="text-2xl font-black uppercase tracking-tighter">GUACARA<br><span class="text-gte-orange">TE ESCUCHA</span></h2>
        </div>
        <div class="flex-grow px-4">
            <button class="w-full text-left p-4 bg-white/10 rounded-xl font-bold text-sm uppercase">📁 Repositorio</button>
        </div>
        <div class="p-8">
            <button onclick="location.reload()" class="w-full py-4 bg-red-500/20 text-red-400 rounded-xl text-[10px] font-black uppercase">Cerrar Sesión</button>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main id="main-content" class="hidden flex-grow p-8 md:p-16 overflow-y-auto bg-white">
        <header class="mb-12">
            <h2 class="text-4xl font-black text-gte-blue uppercase tracking-tight">Repositorio GTE</h2>
            <p class="text-slate-400 mt-2 font-bold uppercase text-[10px] tracking-widest">Gestión Clínica Municipal</p>
        </header>

        <div class="bg-slate-50 p-12 rounded-[45px] text-center border-2 border-dashed border-slate-200">
            <p class="text-slate-400 font-bold uppercase text-xs mb-4">Módulo de Repositorio Activado</p>
            <div id="exp-list" class="text-left space-y-4">
                <!-- Los expedientes se mostrarán aquí -->
            </div>
        </div>
    </main>

    <script type="module">
        const USUARIOS_ESTATICOS = {
            master: { user: "admin_master", pass: "gte2026master" }
        };

        window.togglePasswordVisibility = () => {
            const passInput = document.getElementById('user_pass');
            const openEye = document.getElementById('eye-open');
            const closedEye = document.getElementById('eye-closed');

            if (passInput.type === 'password') {
                passInput.type = 'text';
                openEye.classList.add('hidden');
                closedEye.classList.remove('hidden');
            } else {
                passInput.type = 'password';
                openEye.classList.remove('hidden');
                closedEye.classList.add('hidden');
            }
        };

        window.iniciarSesionCloud = async () => {
            const u = document.getElementById('user_id').value.trim().toLowerCase();
            const p = document.getElementById('user_pass').value;
            const loading = document.getElementById('login-loading');

            loading.classList.remove('hidden');

            // Simulación de validación basada en los requisitos originales
            setTimeout(() => {
                loading.classList.add('hidden');
                
                if (u !== USUARIOS_ESTATICOS.master.user) {
                    alert("❌ El usuario no está bien escrito o no existe.");
                } else if (p !== USUARIOS_ESTATICOS.master.pass) {
                    alert("❌ Contraseña no válida.");
                } else {
                    // ÉXITO
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('sidebar').classList.remove('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                }
            }, 1000);
        };
    </script>
</body>
</html>
