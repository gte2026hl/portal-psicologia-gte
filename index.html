<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTE - Sistema Clínico HDC 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { navy: '#001f3f', orange: '#ff851b' } } } }
    </script>
</head>
<body id="cuerpo" class="bg-[#001f3f] min-h-screen font-sans text-white transition-all duration-700">

    <div id="contenedor-principal" class="min-h-screen flex items-center justify-center p-4">
        
        <div id="seccion-login" class="w-full max-w-md p-8 bg-white rounded-xl shadow-2xl text-slate-800">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-navy">Guacara Te Escucha</h1>
                <p class="text-xs text-slate-500 font-black tracking-widest uppercase">Fase 3: Gestión de Pacientes</p>
            </div>

            <form id="formularioLogin" class="space-y-5">
                <div>
                    <label class="block text-xs font-black text-navy uppercase mb-1">Código FVP</label>
                    <input type="text" id="fvp" placeholder="Ej: 12345" required class="w-full p-3 border-2 border-slate-100 rounded-lg outline-none focus:border-orange text-navy font-bold">
                </div>
                <div>
                    <label class="block text-xs font-black text-navy uppercase mb-1">Contraseña</label>
                    <input type="password" id="pass" placeholder="••••••••" required class="w-full p-3 border-2 border-slate-100 rounded-lg outline-none focus:border-orange text-navy font-bold">
                </div>
                <button type="submit" id="btnIngresar" class="w-full bg-orange text-white font-black py-4 rounded-lg hover:brightness-110 shadow-lg transition-all uppercase tracking-widest">
                    Entrar al Sistema
                </button>
            </form>
            <div class="mt-8 border-t pt-4 text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase">Tecnología de Automatización HDC 2026</p>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN TÉCNICA
        const SUPA_URL = 'https://oqarmkugdzedptbqcygq.supabase.co'; 
        const SUPA_KEY = 'sb_publishable_rQkY-aQgOyW_eh-fyO_JkA_tLXKdqK0';
        const gte_engine = supabase.createClient(SUPA_URL, SUPA_KEY);

        // PROCESO DE ENTRADA
        document.getElementById('formularioLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fvpVal = document.getElementById('fvp').value;
            const passVal = document.getElementById('pass').value;
            const btn = document.getElementById('btnIngresar');

            btn.innerHTML = "CONECTANDO CON LA NUBE...";
            btn.disabled = true;

            try {
                const { data, error } = await gte_engine
                    .from('psicologos')
                    .select('*')
                    .eq('codigo_fvp', fvpVal)
                    .single();

                if (error || !data) {
                    alert("ERROR: Especialista no encontrado.");
                } else if (data.password !== passVal) {
                    alert("ERROR: Contraseña incorrecta.");
                } else {
                    // SI TODO ESTÁ BIEN, CARGAMOS EL PANEL
                    activarPanelClinico(data);
                }
            } catch (err) {
                alert("Error de conexión");
            } finally {
                btn.innerHTML = "Entrar al Sistema";
                btn.disabled = false;
            }
        });

        // FUNCIÓN MAESTRA DEL PANEL
        function activarPanelClinico(doctor) {
            // 1. Limpiar pantalla y cambiar fondo
            document.getElementById('cuerpo').className = "bg-slate-100 min-h-screen font-sans text-slate-900";
            const main = document.getElementById('contenedor-principal');
            main.className = "w-full max-w-6xl mx-auto p-6";

            // 2. Dibujar la nueva interfaz
            main.innerHTML = `
                <div class="animate-in fade-in duration-1000">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border-b-4 border-orange">
                        <div class="mb-4 md:mb-0">
                            <h1 class="text-2xl font-black text-navy uppercase tracking-tighter">Portal Clínico GTE</h1>
                            <p class="text-sm text-slate-500">Bienvenido/a, <span class="text-orange font-bold">${doctor.nombres} ${doctor.apellidos}</span></p>
                        </div>
                        <div class="flex gap-4">
                            <div class="text-right hidden md:block">
                                <p class="text-[10px] font-bold text-slate-400">FVP REGISTRADO</p>
                                <p class="text-sm font-black text-navy">${doctor.codigo_fvp}</p>
                            </div>
                            <button onclick="location.reload()" class="bg-navy text-white px-6 py-2 rounded-full text-xs font-bold hover:bg-red-600 transition-all">SALIR</button>
                        </div>
                    </div>

                    <div class="grid md:grid-cols-3 gap-8">
                        <div class="md:col-span-1">
                            <div class="bg-navy p-6 rounded-2xl text-white shadow-xl mb-6">
                                <h3 class="text-orange font-black text-xs uppercase mb-4 tracking-widest">Control Maestro</h3>
                                <button class="w-full bg-orange py-3 rounded-xl font-bold text-sm shadow-lg mb-4 hover:scale-105 transition-transform">+ NUEVA CONSULTA</button>
                                <button class="w-full bg-white/10 py-3 rounded-xl font-bold text-sm hover:bg-white/20">HISTORIAL DE SESIONES</button>
                            </div>
                        </div>

                        <div class="md:col-span-2">
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div class="bg-slate-50 p-4 border-b">
                                    <h3 class="font-bold text-navy">Listado de Pacientes (Fase 3)</h3>
                                </div>
                                <div class="p-20 text-center">
                                    <div class="bg-slate-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                                    </div>
                                    <p class="text-slate-400 font-bold">No hay expedientes vinculados a este FVP.</p>
                                    <p class="text-xs text-slate-300 mt-2">Los nuevos pacientes aparecerán aquí automáticamente.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
