<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTE - Sistema de Gestión Clínica 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#001f3f',
                        orange: '#ff851b'
                    }
                }
            }
        }
    </script>
    
    <style>
        .bg-wireframe {
            background-color: #001f3f;
            background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .dashboard-bg { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-wireframe min-h-screen font-sans text-white">

    <div id="app-container" class="min-h-screen flex items-center justify-center p-4">
        
        <div id="login-view" class="w-full max-w-4xl grid md:grid-cols-2 bg-navy border border-gray-700 shadow-2xl rounded-xl overflow-hidden">
            <div class="p-10 flex flex-col justify-center items-center text-center relative border-r border-gray-700">
                <svg class="w-32 h-32 text-orange mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                <h1 class="text-3xl font-bold mb-2">Guacara Te Escucha</h1>
                <p class="text-gray-300 text-sm tracking-widest uppercase italic">HDC 2026 Engineering</p>
                <div class="mt-8 text-xs text-gray-500 uppercase tracking-tighter">Fase 3: Atención Psicológica Especializada</div>
            </div>

            <div class="bg-white text-gray-800 p-10 flex flex-col justify-center">
                <h2 class="text-2xl font-bold text-navy mb-6 text-center">Acceso Especialistas</h2>
                <form id="loginForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Código FVP (Federación)</label>
                        <input type="text" id="fvpInput" placeholder="Ej: 12345" required class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                        <input type="password" id="passwordInput" placeholder="••••••••" required class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange outline-none">
                    </div>
                    <button type="submit" id="loginBtn" class="w-full bg-orange hover:bg-orange/90 text-white font-bold py-3 rounded-md transition-all shadow-lg transform active:scale-95">
                        Ingresar al Portal Clínico
                    </button>
                </form>
                <p class="mt-12 text-center text-[10px] text-gray-400 font-bold uppercase tracking-widest border-t pt-4">Propiedad Intelectual HDC 2026</p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DE CONEXIÓN ---
        const _SUPABASE_URL = 'https://oqarmkugdzedptbqcygq.supabase.co'; 
        const _SUPABASE_KEY = 'sb_publishable_rQkY-aQgOyW_eh-fyO_JkA_tLXKdqK0';
        
        const GTE_DB = supabase.createClient(_SUPABASE_URL, _SUPABASE_KEY);

        // --- 2. MANEJO DE LOGIN ---
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fvp = document.getElementById('fvpInput').value;
            const btn = document.getElementById('loginBtn');
            
            btn.innerHTML = 'Verificando en HDC Cloud...';
            btn.disabled = true;

            try {
                const { data, error } = await GTE_DB
                    .from('psicologos')
                    .select('*')
                    .eq('codigo_fvp', fvp)
                    .single();

                if (error || !data) {
                    alert('ERROR: Credencial FVP no válida en el Municipio Guacara.');
                } else if (!data.activo) {
                    alert('ACCESO DENEGADO: Especialista Inactivo.');
                } else {
                    renderDashboard(data);
                }
            } catch (err) {
                alert('Fallo crítico de conexión.');
            } finally {
                btn.innerHTML = 'Ingresar al Portal Clínico';
                btn.disabled = false;
            }
        });

        // --- 3. RENDERIZADO DEL DASHBOARD ---
        function renderDashboard(user) {
            const container = document.getElementById('app-container');
            container.classList.remove('items-center', 'justify-center');
            container.classList.add('block');
            
            document.body.classList.remove('bg-wireframe');
            document.body.classList.add('dashboard-bg');

            container.innerHTML = `
                <div class="min-h-screen flex flex-col">
                    <header class="bg-navy text-white p-4 shadow-xl flex justify-between items-center border-b-2 border-orange">
                        <div class="flex items-center gap-4">
                            <div class="bg-orange p-2 rounded shadow-inner">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            </div>
                            <span class="font-black tracking-tighter text-xl">GTE <span class="font-light text-gray-400">| SISTEMA</span></span>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-orange font-bold uppercase">Psicólogo(a) Titular</p>
                            <p class="font-medium text-sm">${user.nombres} ${user.apellidos}</p>
                        </div>
                    </header>

                    <main class="flex-grow p-6 grid md:grid-cols-4 gap-6">
                        <aside class="md:col-span-1 space-y-4">
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                <h3 class="text-navy font-bold mb-4 flex items-center gap-2">
                                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Sistema Online
                                </h3>
                                <div class="space-y-3">
                                    <button onclick="location.reload()" class="w-full py-2 bg-slate-100 text-slate-600 rounded text-sm font-bold hover:bg-red-50 hover:text-red-600 transition-all">Cerrar Sesión</button>
                                </div>
                            </div>
                        </aside>

                        <section class="md:col-span-3">
                            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                                    <h2 class="text-navy font-bold">Agenda de Consultas (Fase 3)</h2>
                                    <span class="text-xs font-mono bg-navy text-white px-2 py-1 rounded">ID: ${user.codigo_fvp}</span>
                                </div>
                                <div class="p-12 text-center">
                                    <div class="inline-block p-4 bg-orange/10 rounded-full text-orange mb-4">
                                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    </div>
                                    <h4 class="text-slate-800 font-bold">Bandeja de Entrada Vacía</h4>
                                    <p class="text-slate-500 text-sm max-w-xs mx-auto mt-2">No tienes pacientes asignados actualmente. Contacta al Administrador de Sala.</p>
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer class="p-4 bg-white border-t text-center text-[10px] text-gray-400 font-medium tracking-widest">
                        ESTA PLATAFORMA ES PROPIEDAD DEL MUNICIPIO GUACARA | DESARROLLO TÉCNICO: HDC 2026
                    </footer>
                </div>
            `;
        }
    </script>
</body>
</html>
