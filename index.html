<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTE - Sistema Clínico HDC 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body id="main-body" class="bg-[#001f3f] min-h-screen font-sans text-white">

    <div id="app" class="min-h-screen flex items-center justify-center p-4">
        <div id="login-screen" class="w-full max-w-md p-8 bg-white rounded-2xl shadow-2xl text-slate-800">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-black text-[#001f3f]">Guacara Te Escucha</h1>
                <p class="text-[10px] text-orange-600 font-bold tracking-widest uppercase">Fase 3: Atención Individual</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-[#001f3f] uppercase mb-1">Código FVP</label>
                    <input type="text" id="fvp" placeholder="12345" required class="w-full p-3 border-2 border-slate-100 rounded-xl outline-none focus:border-orange-500 text-navy font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-[#001f3f] uppercase mb-1">Contraseña</label>
                    <input type="password" id="pass" placeholder="••••••••" required class="w-full p-3 border-2 border-slate-100 rounded-xl outline-none focus:border-orange-500 text-navy font-bold">
                </div>
                <button type="submit" id="btn" class="w-full bg-[#ff851b] text-white font-black py-4 rounded-xl hover:brightness-110 shadow-lg transition-all uppercase">
                    Entrar al Sistema
                </button>
            </form>
            <p class="text-[9px] text-center mt-6 text-slate-400 font-bold uppercase">HDC 2026 | Ingeniería de Software</p>
        </div>
    </div>

    <script>
        const SB_URL = 'https://oqarmkugdzedptbqcygq.supabase.co'; 
        const SB_KEY = 'sb_publishable_rQkY-aQgOyW_eh-fyO_JkA_tLXKdqK0';
        const gte = supabase.createClient(SB_URL, SB_KEY);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const fvpVal = document.getElementById('fvp').value;
            const passVal = document.getElementById('pass').value;

            btn.innerHTML = "CONECTANDO...";
            btn.disabled = true;

            try {
                const { data, error } = await gte
                    .from('psicologos')
                    .select('*')
                    .eq('codigo_fvp', fvpVal)
                    .single();

                if (error || !data) {
                    alert("Especialista no encontrado en la base de datos.");
                } else if (data.password !== passVal) {
                    alert("Contraseña incorrecta.");
                } else {
                    // SI TODO ES CORRECTO, CARGAMOS EL PANEL DIRECTAMENTE
                    renderDashboard(data);
                }
            } catch (err) {
                alert("Error de red");
            } finally {
                btn.innerHTML = "Entrar al Sistema";
                btn.disabled = false;
            }
        });

        function renderDashboard(user) {
            // CAMBIO TOTAL DE INTERFAZ
            const body = document.getElementById('main-body');
            body.classList.remove('bg-[#001f3f]');
            body.classList.add('bg-slate-50');
            
            body.innerHTML = `
                <div class="min-h-screen p-4 md:p-8 text-slate-800">
                    <header class="max-w-6xl mx-auto flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border-b-4 border-[#ff851b] mb-8">
                        <div>
                            <h2 class="text-xl font-black text-[#001f3f]">PORTAL CLÍNICO GTE</h2>
                            <p class="text-sm text-slate-500">Especialista: <span class="font-bold text-[#ff851b] uppercase">${user.nombres} ${user.apellidos}</span></p>
                        </div>
                        <button onclick="location.reload()" class="bg-[#001f3f] text-white px-5 py-2 rounded-full text-xs font-bold hover:bg-red-600 transition-all">SALIR</button>
                    </header>

                    <main class="max-w-6xl mx-auto grid md:grid-cols-3 gap-6">
                        <div class="md:col-span-1">
                            <div class="bg-[#001f3f] p-6 rounded-2xl text-white shadow-xl">
                                <p class="text-[10px] font-bold text-orange-400 uppercase mb-4 tracking-widest">Gestión de Turnos</p>
                                <button class="w-full bg-[#ff851b] py-3 rounded-xl font-black text-sm mb-4 shadow-lg hover:scale-105 transition-transform">+ NUEVA CONSULTA</button>
                                <button class="w-full bg-white/10 py-3 rounded-xl font-bold text-sm hover:bg-white/20">HISTORIAL GENERAL</button>
                            </div>
                        </div>
                        
                        <div class="md:col-span-2">
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div class="p-4 bg-slate-50 border-b font-bold text-[#001f3f]">Listado de Pacientes - Fase 3</div>
                                <div class="p-20 text-center">
                                    <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300">
                                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                    </div>
                                    <p class="text-slate-400 font-bold italic">No hay expedientes activos para el FVP ${user.codigo_fvp}</p>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            `;
        }
    </script>
</body>
</html>
