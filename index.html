<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTE 2026 - Portal de Gestión Clínica</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Open+Sans:wght@400;600;700&display=swap');
        :root { --gte-blue: #003366; --gte-orange: #FF6600; --gte-bg: #f8fafc; }
        body { font-family: 'Open Sans', sans-serif; background-color: var(--gte-bg); margin: 0; }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; }
        
        .btn-gte-orange { background: var(--gte-orange); color: white; font-weight: 800; border-radius: 12px; transition: 0.3s; cursor: pointer; border: none; }
        .btn-gte-orange:hover { background: var(--gte-blue); transform: translateY(-2px); }
        .nav-button { width: 100%; text-align: left; padding: 14px 20px; display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 700; color: #94a3b8; transition: 0.3s; border-radius: 12px; background: transparent; border: none; cursor: pointer; }
        .nav-button.active { background: rgba(255,102,0,0.1); color: var(--gte-orange); }
        .form-input { width: 100%; border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px; outline: none; transition: 0.3s; }
        .form-input:focus { border-color: var(--gte-orange); }
        .clinical-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 9999; }
        #gte-toast { position: fixed; bottom: 20px; right: 20px; background: var(--gte-blue); color: white; padding: 15px 25px; border-radius: 10px; border-left: 5px solid var(--gte-orange); display: none; z-index: 10001; font-weight: 800; font-size: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

    <div id="login-screen" class="fixed inset-0 z-[100] bg-[#003366] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[40px] shadow-2xl p-10 text-center border-t-8 border-gte-orange">
            <h1 class="text-3xl font-black text-gte-blue uppercase tracking-tighter">Guacara Te Escucha</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-10">Acceso Restringido 2026</p>
            <div class="space-y-4">
                <input type="email" id="login-email" class="form-input" placeholder="Correo Institucional">
                <input type="password" id="login-pass" class="form-input" placeholder="••••••••">
                <button onclick="ejecutarLogin()" class="w-full btn-gte-orange py-4 text-xs uppercase tracking-widest shadow-lg mt-4">Validar Identidad</button>
            </div>
        </div>
    </div>

    <nav id="sidebar" class="hidden w-full md:w-64 bg-white border-r h-screen sticky top-0 flex flex-col p-6 shadow-sm">
        <div class="mb-10">
            <h2 class="text-lg font-black text-gte-blue leading-tight uppercase">GTE<span class="text-gte-orange">2026</span></h2>
            <p id="display-user-rol" class="text-[8px] font-black text-slate-300 uppercase tracking-widest mt-1">Cargando...</p>
        </div>
        <div id="nav-menu" class="flex-grow space-y-2"></div>
        <div class="pt-6 border-t">
            <div class="text-[10px] font-black text-gte-blue mb-2 uppercase truncate" id="display-user-name">Usuario</div>
            <button onclick="cerrarSesion()" class="w-full py-3 bg-red-50 rounded-xl text-[10px] font-black text-red-500 uppercase hover:bg-red-100 transition border-none cursor-pointer">Cerrar Sesión</button>
        </div>
    </nav>

    <main id="main-content" class="hidden flex-grow p-8 overflow-y-auto">
        <section id="tab-master-stats" class="tab-content hidden">
            <h2 class="text-3xl font-black text-gte-blue mb-8 uppercase tracking-tighter">Control de Gestión</h2>
            <div id="kpi-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>

        <section id="tab-repositorio" class="tab-content hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
                <div>
                    <h2 class="text-3xl font-black text-gte-blue uppercase tracking-tighter">Repositorio Maestro</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Base de Datos Municipal</p>
                </div>
                <div id="master-only-upload" class="hidden">
                    <input type="file" id="excel-file" class="hidden" accept=".xlsx" onchange="procesarCargaMaestra(event)">
                    <button onclick="document.getElementById('excel-file').click()" class="bg-white border-2 border-gte-blue text-gte-blue px-6 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-gte-blue hover:text-white transition shadow-sm cursor-pointer">📊 Importar Excel</button>
                </div>
            </div>
            <div class="bg-white rounded-[25px] shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr class="text-[10px] font-black text-slate-400 uppercase">
                            <th class="p-5">Expediente</th>
                            <th class="p-5">Paciente y Datos</th>
                            <th class="p-5">Institución</th>
                            <th class="p-5 text-center">Fase</th>
                            <th class="p-5">Estatus</th>
                            <th class="p-5 text-right">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="lista-expedientes" class="text-sm"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="gte-toast">Operación Exitosa</div>

    <script>
        const SUPABASE_URL = "https://mltfjgkbparwwofgknjg.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sdGZqZ2ticGFyd3dvZmdrbmpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjExNTIsImV4cCI6MjA5Mzk5NzE1Mn0.LZQESe5Nvuor2apbAdhfHlCr_hBtI-pb6wTEKAK0ldU";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let usuarioActual = null;

        async function ejecutarLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value;
            const { data: { user }, error: authError } = await _supabase.auth.signInWithPassword({ email, password: pass });
            if (authError) return alert("❌ Error: " + authError.message);

            const { data: perfiles } = await _supabase.from('usuarios').select('*').eq('id', user.id);
            if (!perfiles.length) return alert("Perfil no encontrado.");

            usuarioActual = perfiles[0];
            iniciarApp();
        }

        function iniciarApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('display-user-name').innerText = usuarioActual.nombre;
            document.getElementById('display-user-rol').innerText = usuarioActual.rol;

            const menu = document.getElementById('nav-menu');
            if (usuarioActual.rol === 'MASTER') {
                document.getElementById('master-only-upload').classList.remove('hidden');
                menu.innerHTML = `<button onclick="cambiarTab('tab-master-stats')" class="nav-button active">📊 Estadísticas</button>
                                  <button onclick="cambiarTab('tab-repositorio')" class="nav-button">📁 Repositorio Maestro</button>`;
                cambiarTab('tab-master-stats');
                cargarEstadisticas();
            } else {
                menu.innerHTML = `<button onclick="cambiarTab('tab-repositorio')" class="nav-button active">📁 Casos Disponibles</button>`;
                cambiarTab('tab-repositorio');
            }
            cargarExpedientes();
        }

        // CARGA MAESTRA CON LIMPIEZA DE COLUMNAS
        async function procesarCargaMaestra(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (evt) => {
                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rawData = XLSX.utils.sheet_to_json(ws);

                const lotes = rawData.map(fila => {
                    const f = {};
                    Object.keys(fila).forEach(key => f[key.trim().toUpperCase()] = fila[key]);
                    return {
                        id_gte: String(f['EXPEDIENTE'] || f['EXP'] || '').trim(),
                        fase_actual: String(f['FASE'] || '3').trim(),
                        nombre_paciente: String(f['NOMBRE Y APELLIDO'] || f['NOMBRE'] || 'N/I').trim().toUpperCase(),
                        institucion_educativa: String(f['INSTITUCIÓN'] || f['INSTITUCION'] || f['ESCUELA'] || 'N/I').trim().toUpperCase(),
                        cedula_paciente: String(f['CÉDULA'] || f['CEDULA'] || f['CI'] || 'N/I').trim(),
                        edad_paciente: parseInt(f['EDAD']) || 0,
                        seguimiento: 'Sin Iniciar'
                    };
                }).filter(x => x.id_gte !== '');

                const { error } = await _supabase.from('expedientes').upsert(lotes, { onConflict: 'id_gte' });
                if(!error) {
                    lanzarToast(`✅ ${lotes.length} CASOS CARGADOS`);
                    cargarExpedientes();
                    cargarEstadisticas();
                }
            };
            reader.readAsBinaryString(file);
        }

        // FUNCIÓN ACTUALIZADA CON EL SUBTÍTULO DE CÉDULA Y EDAD
        async function cargarExpedientes() {
            const { data } = await _supabase.from('expedientes').select('*').order('id_gte', { ascending: true });
            const body = document.getElementById('lista-expedientes');
            body.innerHTML = (data || []).map(exp => `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition">
                    <td class="p-5 font-black text-gte-orange text-xs">${exp.id_gte}</td>
                    <td class="p-5">
                        <div class="font-bold text-gte-blue text-[11px] uppercase">${exp.nombre_paciente}</div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase">CI: ${exp.cedula_paciente} - EDAD: ${exp.edad_paciente}</div>
                    </td>
                    <td class="p-5 text-[9px] font-bold text-slate-400 uppercase">${exp.institucion_educativa}</td>
                    <td class="p-5 text-center"><span class="bg-blue-50 text-gte-blue px-3 py-1 rounded-full font-black text-[10px]">${exp.fase_actual}</span></td>
                    <td class="p-5 text-[9px] font-black uppercase text-slate-300">${exp.seguimiento}</td>
                    <td class="p-5 text-right"><span class="text-[9px] font-bold text-slate-400 italic">${exp.psico_asignado_nombre || 'Libre'}</span></td>
                </tr>`).join('');
        }

        async function cargarEstadisticas() {
            const { data } = await _supabase.from('expedientes').select('fase_actual, psico_asignado_id');
            const stats = [
                { t: "Total Casos", v: data.length, c: "text-gte-blue" },
                { t: "En Atención", v: data.filter(x => x.psico_asignado_id).length, c: "text-blue-500" },
                { t: "Pendientes", v: data.filter(x => !x.psico_asignado_id).length, c: "text-gte-orange" },
                { t: "Fase 4", v: data.filter(x => x.fase_actual == "4").length, c: "text-red-600" }
            ];
            document.getElementById('kpi-grid').innerHTML = stats.map(s => `
                <div class="bg-white p-6 rounded-[25px] border border-slate-100 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase">${s.t}</p>
                    <h3 class="text-3xl font-black ${s.c} mt-2">${s.v}</h3>
                </div>`).join('');
        }

        function cambiarTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');
        }

        function lanzarToast(m) {
            const t = document.getElementById('gte-toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function cerrarSesion() { location.reload(); }
    </script>
</body>
</html>
